<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>budget_gpu_debugger</title>
    <style>
      html, body {
        margin: 0px;
        --bg: #16171d;
      }
      header {
        position: sticky;
        top: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        background: var(--bg);
        padding: 8px;
        border-bottom: 1px solid gray;
      }
      main {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: auto auto minmax(min-content, 1fr);
      }
      pre {
        overflow: scroll;
        margin: 0px;
        padding: 4px;
      }
      .input {
        min-height: 100vh;
      }
      .output {
        border-left: 2px solid gray;
        color: black;
      }
      canvas {
        position: fixed;
        border: 2px solid blue;
        bottom: 10px;
        right: 10px;
      }
      .errors {
        position: fixed;
        border: 2px solid red;
        bottom: 10px;
        left: 10px;
        height: 6em;
        width: calc(50% - 20px);
        display: none;
        background: var(--bg);
      }
      @media (prefers-color-scheme: dark) {
        .output {
          color: white;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <!--Titles-->
      <h2>Code editor</h2>
      <h2>Debugger</h2>
      <!--Buttons-->
      <div></div>
      <div>
        <button class="step-forwards">Step Forwards</button>
        <button class="step-backwards">Step Backwards</button>
      </div>
    </header>
    <main>
      <!--Output-->
      <pre
        contenteditable="plaintext-only"
        class="input"
      ></pre>
      <pre class="output"></pre>
    </main>

    <pre class="errors"></pre>
    <canvas></canvas>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
